name: JS & CSS Lint

on:
  push:
    branches: [master, develop]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.eslintrc*'
      - '.stylelintrc*'
      - '.eslintignore'
      - '.stylelintignore'
  pull_request:
    branches: [master, develop]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.eslintrc*'
      - '.stylelintrc*'
      - '.eslintignore'
      - '.stylelintignore'

jobs:
  lint:
    name: Lint JS & CSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint CSS/SCSS
        run: npm run lint:css
