name: Deploy to WordPress.org

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build and show files, do not commit to SVN)'
        type: boolean
        default: true
      version:
        description: 'Plugin version for dry-run tag (e.g. 1.0.14)'
        type: string
        default: '0.0.0'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version sanity check (release only)
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG="${TAG#v}"
          PLUGIN_VERSION=$(grep -oE '^ \* Version: [0-9.]+' pollify.php | grep -oE '[0-9.]+')
          STABLE_TAG=$(grep -oE '^Stable tag: [0-9.]+' readme.txt | grep -oE '[0-9.]+')

          echo "Tag: $TAG / pollify.php: $PLUGIN_VERSION / readme.txt stable: $STABLE_TAG"

          if [ "$TAG" != "$PLUGIN_VERSION" ] || [ "$TAG" != "$STABLE_TAG" ]; then
            echo "::error::Version mismatch — release tag, pollify.php Version and readme.txt Stable tag must all match."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install WP-CLI (needed by makepot)
        run: |
          curl -sLO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
          wp --version

      - name: Build JS assets and translation file
        run: |
          npm ci
          npm run build

      - name: Install production PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy to WordPress.org SVN
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: poll-creator
          BUILD_TAG: ${{ github.event_name == 'workflow_dispatch' && (inputs.version || '0.0.0') || '' }}

      - name: Attach zip to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.deploy.outputs.zip-path }}

      - name: Upload zip artifact for inspection (dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: poll-creator-release-zip
          path: ${{ steps.deploy.outputs.zip-path }}
