name: Playground Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to update'
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-playground-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install JS dependencies and build
        run: |
          npm ci
          npx wp-scripts build
          npm run build:custom

      - name: Install production PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create plugin zip
        run: npx wp-scripts plugin-zip

      - name: Upload plugin zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: poll-creator
          path: poll-creator.zip

      - name: Generate Playground URL
        id: playground
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          REPO="${{ github.repository }}"
          URL=$(python3 -c "
          import json, urllib.parse, sys
          repo, pr = sys.argv[1], sys.argv[2]
          org, name = repo.split('/')
          proxy = (
              'https://playground.wordpress.net/plugin-proxy.php'
              '?org=' + org + '&repo=' + name
              + '&workflow=' + urllib.parse.quote('Playground Build')
              + '&artifact=poll-creator&pr=' + pr
          )
          bp = {'steps': [{'step': 'installPlugin', 'pluginData': {'resource': 'url', 'url': proxy}, 'options': {'activate': True}}]}
          print('https://playground.wordpress.net/#' + urllib.parse.quote(json.dumps(bp, separators=(',', ':'))))
          " "$REPO" "$PR_NUMBER")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Update PR description with Playground URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          PLAYGROUND_URL: ${{ steps.playground.outputs.url }}
        run: |
          python3 - << 'PYEOF'
          import os, re, subprocess

          pr_num  = os.environ['PR_NUMBER']
          new_url = os.environ['PLAYGROUND_URL']

          body = subprocess.run(
              ['gh', 'pr', 'view', pr_num, '--json', 'body', '-q', '.body'],
              capture_output=True, text=True
          ).stdout

          # Replace existing Playground link (handles both template placeholder and real URLs).
          pattern     = r'\[▶ Test in WP Playground\]\([^)]+\)'
          replacement = '[▶ Test in WP Playground](' + new_url + ')'

          if re.search(pattern, body):
              updated = re.sub(pattern, replacement, body)
          else:
              updated = body.rstrip() + '\n\n## Test in WP Playground\n' + replacement + '\n'

          subprocess.run(['gh', 'pr', 'edit', pr_num, '--body', updated], check=True)
          print(f'PR #{pr_num} updated with Playground URL.')
          PYEOF
