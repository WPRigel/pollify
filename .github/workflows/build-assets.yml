name: Playground Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to update'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build-playground-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install JS dependencies and build
        run: |
          npm ci
          npx wp-scripts build
          npm run build:custom

      - name: Install production PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create plugin zip
        run: npx wp-scripts plugin-zip

      - name: Upload plugin zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: poll-creator
          path: poll-creator.zip

      # raw.githubusercontent.com serves with `access-control-allow-origin: *`,
      # which WP Playground requires. plugin-proxy.php only allows approved orgs.
      - name: Publish zip to playground-builds branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          set -e
          WORK=/tmp/playground-builds
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # Reuse existing branch contents so other PRs' zips survive the force push.
          if git clone --depth 1 --branch playground-builds "$REPO_URL" "$WORK" 2>/dev/null; then
            cd "$WORK"
          else
            mkdir -p "$WORK" && cd "$WORK"
            git init -b playground-builds
            git remote add origin "$REPO_URL"
          fi

          mkdir -p "pr-${PR_NUMBER}"
          cp "$GITHUB_WORKSPACE/poll-creator.zip" "pr-${PR_NUMBER}/poll-creator.zip"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Single orphan commit keeps the branch free of binary history bloat.
          git checkout --orphan latest-build
          git add -A
          git commit -m "Playground build for PR #${PR_NUMBER} (${{ github.event.pull_request.head.sha || github.sha }})"
          git push -f origin latest-build:playground-builds

      - name: Generate Playground URL
        id: playground
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          REPO="${{ github.repository }}"
          URL=$(python3 -c "
          import json, urllib.parse, sys
          repo, pr, sha = sys.argv[1], sys.argv[2], sys.argv[3]
          # Cache-buster sha keeps the link pointing at this exact build despite CDN caching.
          zip_url = (
              'https://raw.githubusercontent.com/' + repo
              + '/playground-builds/pr-' + pr + '/poll-creator.zip?cb=' + sha
          )
          bp = {'steps': [{'step': 'installPlugin', 'pluginData': {'resource': 'url', 'url': zip_url}, 'options': {'activate': True}}]}
          print('https://playground.wordpress.net/#' + urllib.parse.quote(json.dumps(bp, separators=(',', ':'))))
          " "$REPO" "$PR_NUMBER" "$HEAD_SHA")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Update PR description with Playground URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          PLAYGROUND_URL: ${{ steps.playground.outputs.url }}
        run: |
          python3 - << 'PYEOF'
          import os, re, subprocess

          pr_num  = os.environ['PR_NUMBER']
          new_url = os.environ['PLAYGROUND_URL']

          body = subprocess.run(
              ['gh', 'pr', 'view', pr_num, '--json', 'body', '-q', '.body'],
              capture_output=True, text=True
          ).stdout

          # Replace existing Playground link (handles both template placeholder and real URLs).
          pattern     = r'\[▶ Test in WP Playground\]\([^)]+\)'
          replacement = '[▶ Test in WP Playground](' + new_url + ')'

          if re.search(pattern, body):
              updated = re.sub(pattern, replacement, body)
          else:
              updated = body.rstrip() + '\n\n## Test in WP Playground\n' + replacement + '\n'

          subprocess.run(['gh', 'pr', 'edit', pr_num, '--body', updated], check=True)
          print(f'PR #{pr_num} updated with Playground URL.')
          PYEOF
