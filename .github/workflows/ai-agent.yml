name: AI Coding Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-agent:
    if: github.event.label.name == 'ai:claude' && github.event.sender.login == 'sabbir1991' && github.event.issue.pull_request == null
    runs-on: self-hosted
    environment: ai-agent
    timeout-minutes: 30

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci
          composer install --no-interaction

      - name: Prepare branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ github.event.issue.number }}"
          TITLE="${{ github.event.issue.title }}"
          LABELS=$(gh issue view "$ISSUE" --json labels -q '.labels[].name' | tr '\n' ',')

          PREFIX="feature"
          echo "$LABELS" | grep -qi "bug" && PREFIX="fix"

          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40 | sed 's/-$//')
          BRANCH="${PREFIX}/issue-${ISSUE}-${SLUG}"

          git config user.name "Pollify AI Agent"
          git config user.email "agent@wprigel.com"
          git checkout develop
          git pull origin develop
          git checkout -b "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"

      - name: Build agent prompt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.branch.outputs.issue }}
        run: |
          export ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q '.title')
          export ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body')

          python3 -c "
          import os
          issue = os.environ['ISSUE_NUMBER']
          title = os.environ['ISSUE_TITLE']
          body = os.environ['ISSUE_BODY']
          prompt = (
              'You are an AI coding agent working on GitHub issue #' + issue + ' in the WPRigel/pollify WordPress plugin (poll-creator).\n\n'
              'Issue title: ' + title + '\n\n'
              'Issue body:\n' + body + '\n\n'
              'INSTRUCTIONS - follow exactly in order:\n'
              '1. Read AGENTS.md for project rules and commit format.\n'
              '2. Read CLAUDE.md for full architecture detail.\n'
              '3. Explore relevant files to fully understand the issue.\n'
              '4. Implement the fix or feature satisfying every acceptance criterion.\n'
              '5. Follow WordPress coding standards: nonces, sanitize all input, escape all output, capability checks.\n'
              '6. Keep changes minimal - do not refactor unrelated code.\n'
              '7. Stage all changed files and commit with message: fix: description (#' + issue + ')\n'
              '   Use feat: prefix instead of fix: for new features.\n'
              '8. Output exactly: IMPLEMENTATION_COMPLETE\n\n'
              'Do NOT run lint, tests, or create a PR - the workflow handles those steps.'
          )
          open('/tmp/ai-agent-prompt.txt', 'w').write(prompt)
          "

      - name: Run Claude Code agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude --dangerously-skip-permissions -p "$(cat /tmp/ai-agent-prompt.txt)"

      - name: Run checks
        id: checks
        run: |
          rm -f /tmp/ai-check-results.txt

          npm run lint:js 2>&1 | tee /tmp/ai-lint-js.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "lint:js failed" >> /tmp/ai-check-results.txt; fi

          npm run lint:css 2>&1 | tee /tmp/ai-lint-css.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "lint:css failed" >> /tmp/ai-check-results.txt; fi

          composer run cs 2>&1 | tee /tmp/ai-phpcs.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "composer cs (PHPCS) failed" >> /tmp/ai-check-results.txt; fi

          composer run test 2>&1 | tee /tmp/ai-phpunit.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "composer test (PHPUnit) failed" >> /tmp/ai-check-results.txt; fi

          if [ -f /tmp/ai-check-results.txt ]; then
            echo "checks_passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "checks_passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch on failure
        if: steps.checks.outputs.checks_passed == 'false'
        run: |
          git push origin "${{ steps.branch.outputs.branch }}" || true

      - name: Comment failure on issue
        if: steps.checks.outputs.checks_passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ steps.branch.outputs.issue }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          FAILURES=$(cat /tmp/ai-check-results.txt)
          gh issue comment "$ISSUE" --body "$(printf '❌ AI agent checks failed. Branch \`%s\` pushed for manual review.\n\n**Failed:**\n```\n%s\n```\n\nRemove and re-add \`ai:claude\` label to retry.' "$BRANCH" "$FAILURES")"
          exit 1

      - name: Create PR
        if: steps.checks.outputs.checks_passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ steps.branch.outputs.issue }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          ISSUE_TITLE=$(gh issue view "$ISSUE" --json title -q '.title')
          REVIEWER="${{ vars.REVIEWER_USERNAME }}"

          git push origin "$BRANCH"

          PLAYGROUND_URL=$(python3 -c "
          import json, urllib.parse, sys
          branch = sys.argv[1]
          bp = {'steps': [{'step': 'installPlugin', 'pluginData': {'resource': 'url', 'url': 'https://github.com/WPRigel/pollify/archive/refs/heads/' + branch + '.zip'}, 'options': {'activate': True}}]}
          print('https://playground.wordpress.net/#' + urllib.parse.quote(json.dumps(bp, separators=(',', ':'))))
          " "$BRANCH")

          python3 -c "
          import sys, os
          issue = sys.argv[1]
          branch = sys.argv[2]
          title = sys.argv[3]
          playground = sys.argv[4]
          body = (
              '## Closes\n'
              'Closes #' + issue + '\n\n'
              '## Summary\n\n'
              '## Test in WP Playground\n'
              'Click to open a clean WordPress with the plugin pre-installed and activated:\n\n'
              '[Test in WP Playground](' + playground + ')\n\n'
              '## How to Test Manually\n\n'
              '## WordPress Security Checklist\n'
              '- [ ] Nonces verified (wp_verify_nonce)\n'
              '- [ ] Input sanitized (sanitize_text_field, absint, etc.)\n'
              '- [ ] Output escaped (esc_html, esc_attr, esc_url, wp_kses_post)\n'
              '- [ ] Capability checks (current_user_can)\n'
              '- [ ] DB queries use \$wpdb->prepare()\n\n'
              '## Risks / Limitations\n\n'
              '---\n'
              '🤖 Implemented by Claude Code (self-hosted runner) · Issue #' + issue
          )
          open('/tmp/pr-body.txt', 'w').write(body)
          " "$ISSUE" "$BRANCH" "$ISSUE_TITLE" "$PLAYGROUND_URL"

          PR_URL=$(gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --reviewer "$REVIEWER" \
            --body-file /tmp/pr-body.txt)

          gh issue comment "$ISSUE" --body "$(printf '✅ PR ready for review: %s\n\nYou are assigned as reviewer. Click the WP Playground link in the PR to test in browser.' "$PR_URL")"

  codex-agent:
    if: github.event.label.name == 'ai:codex' && github.event.sender.login == 'sabbir1991' && github.event.issue.pull_request == null
    runs-on: self-hosted
    environment: ai-agent
    timeout-minutes: 30

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci
          composer install --no-interaction

      - name: Prepare branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ github.event.issue.number }}"
          TITLE="${{ github.event.issue.title }}"
          LABELS=$(gh issue view "$ISSUE" --json labels -q '.labels[].name' | tr '\n' ',')

          PREFIX="feature"
          echo "$LABELS" | grep -qi "bug" && PREFIX="fix"

          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40 | sed 's/-$//')
          BRANCH="${PREFIX}/issue-${ISSUE}-${SLUG}"

          git config user.name "Pollify AI Agent"
          git config user.email "agent@wprigel.com"
          git checkout develop
          git pull origin develop
          git checkout -b "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"

      - name: Build agent prompt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.branch.outputs.issue }}
        run: |
          export ISSUE_TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q '.title')
          export ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body')

          python3 -c "
          import os
          issue = os.environ['ISSUE_NUMBER']
          title = os.environ['ISSUE_TITLE']
          body = os.environ['ISSUE_BODY']
          prompt = (
              'You are an AI coding agent working on GitHub issue #' + issue + ' in the WPRigel/pollify WordPress plugin (poll-creator).\n\n'
              'Issue title: ' + title + '\n\n'
              'Issue body:\n' + body + '\n\n'
              'INSTRUCTIONS - follow exactly in order:\n'
              '1. Read AGENTS.md for project rules and commit format.\n'
              '2. Read CLAUDE.md for full architecture detail.\n'
              '3. Explore relevant files to fully understand the issue.\n'
              '4. Implement the fix or feature satisfying every acceptance criterion.\n'
              '5. Follow WordPress coding standards: nonces, sanitize all input, escape all output, capability checks.\n'
              '6. Keep changes minimal - do not refactor unrelated code.\n'
              '7. Stage all changed files and commit with message: fix: description (#' + issue + ')\n'
              '8. Output exactly: IMPLEMENTATION_COMPLETE\n\n'
              'Do NOT run lint, tests, or create a PR - the workflow handles those steps.'
          )
          open('/tmp/ai-agent-prompt.txt', 'w').write(prompt)
          "

      - name: Run Codex agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex --full-auto "$(cat /tmp/ai-agent-prompt.txt)"

      - name: Run checks
        id: checks
        run: |
          rm -f /tmp/ai-check-results.txt

          npm run lint:js 2>&1 | tee /tmp/ai-lint-js.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "lint:js failed" >> /tmp/ai-check-results.txt; fi

          npm run lint:css 2>&1 | tee /tmp/ai-lint-css.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "lint:css failed" >> /tmp/ai-check-results.txt; fi

          composer run cs 2>&1 | tee /tmp/ai-phpcs.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "composer cs (PHPCS) failed" >> /tmp/ai-check-results.txt; fi

          composer run test 2>&1 | tee /tmp/ai-phpunit.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then echo "composer test (PHPUnit) failed" >> /tmp/ai-check-results.txt; fi

          if [ -f /tmp/ai-check-results.txt ]; then
            echo "checks_passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "checks_passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch on failure
        if: steps.checks.outputs.checks_passed == 'false'
        run: |
          git push origin "${{ steps.branch.outputs.branch }}" || true

      - name: Comment failure on issue
        if: steps.checks.outputs.checks_passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ steps.branch.outputs.issue }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          FAILURES=$(cat /tmp/ai-check-results.txt)
          gh issue comment "$ISSUE" --body "$(printf '❌ Codex agent checks failed. Branch \`%s\` pushed for manual review.\n\n**Failed:**\n```\n%s\n```' "$BRANCH" "$FAILURES")"
          exit 1

      - name: Create PR
        if: steps.checks.outputs.checks_passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ steps.branch.outputs.issue }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          ISSUE_TITLE=$(gh issue view "$ISSUE" --json title -q '.title')
          REVIEWER="${{ vars.REVIEWER_USERNAME }}"

          git push origin "$BRANCH"

          PLAYGROUND_URL=$(python3 -c "
          import json, urllib.parse, sys
          branch = sys.argv[1]
          bp = {'steps': [{'step': 'installPlugin', 'pluginData': {'resource': 'url', 'url': 'https://github.com/WPRigel/pollify/archive/refs/heads/' + branch + '.zip'}, 'options': {'activate': True}}]}
          print('https://playground.wordpress.net/#' + urllib.parse.quote(json.dumps(bp, separators=(',', ':'))))
          " "$BRANCH")

          python3 -c "
          import sys
          issue, branch, title, playground = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
          body = (
              '## Closes\n'
              'Closes #' + issue + '\n\n'
              '## Summary\n\n'
              '## Test in WP Playground\n'
              '[Test in WP Playground](' + playground + ')\n\n'
              '## WordPress Security Checklist\n'
              '- [ ] Nonces verified (wp_verify_nonce)\n'
              '- [ ] Input sanitized\n'
              '- [ ] Output escaped\n'
              '- [ ] Capability checks (current_user_can)\n'
              '- [ ] DB queries use \$wpdb->prepare()\n\n'
              '## Risks / Limitations\n\n'
              '---\n'
              '🤖 Implemented by Codex (self-hosted runner) · Issue #' + issue
          )
          open('/tmp/pr-body.txt', 'w').write(body)
          " "$ISSUE" "$BRANCH" "$ISSUE_TITLE" "$PLAYGROUND_URL"

          PR_URL=$(gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --reviewer "$REVIEWER" \
            --body-file /tmp/pr-body.txt)

          gh issue comment "$ISSUE" --body "$(printf '✅ PR ready for review: %s' "$PR_URL")"
