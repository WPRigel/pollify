name: AI Coding Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-agent:
    if: github.event.label.name == 'ai:claude' && github.event.sender.login == 'sabbir1991' && github.event.issue.pull_request == null
    runs-on: self-hosted
    environment: ai-agent
    timeout-minutes: 30

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci
          composer install --no-interaction

      - name: Prepare branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ github.event.issue.number }}"
          TITLE="${{ github.event.issue.title }}"
          LABELS=$(gh issue view "$ISSUE" --json labels -q '.labels[].name' | tr '\n' ',')

          PREFIX="feature"
          echo "$LABELS" | grep -qi "bug" && PREFIX="fix"

          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | \
            sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40 | sed 's/-$//')
          BRANCH="${PREFIX}/issue-${ISSUE}-${SLUG}"

          git config user.name "Pollify AI Agent"
          git config user.email "agent@wprigel.com"
          git checkout develop
          git pull origin develop
          git checkout -b "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ steps.branch.outputs.issue }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          ISSUE_TITLE=$(gh issue view "$ISSUE" --json title -q '.title')
          ISSUE_BODY=$(gh issue view "$ISSUE" --json body -q '.body')

          PROMPT="You are an AI coding agent working on GitHub issue #${ISSUE} in the WPRigel/pollify WordPress plugin (poll-creator).

Issue title: ${ISSUE_TITLE}

Issue body:
${ISSUE_BODY}

INSTRUCTIONS — follow exactly in order:
1. Read AGENTS.md for project rules and commit format.
2. Read CLAUDE.md for full architecture detail.
3. Explore the relevant files needed to understand the issue.
4. Implement the fix or feature to satisfy every acceptance criterion listed in the issue.
5. Follow WordPress coding standards: nonces, sanitize all input, escape all output, capability checks.
6. Keep changes minimal — do not refactor unrelated code.
7. Stage all changed files and commit with message: fix: <short description> (#${ISSUE})
   (use 'feat:' prefix for features instead of 'fix:')
8. Output exactly: IMPLEMENTATION_COMPLETE

Do NOT run lint, tests, or create a PR — the workflow handles those steps."

          claude --dangerously-skip-permissions -p "$PROMPT"

      - name: Run checks
        id: checks
        run: |
          rm -f /tmp/ai-check-results.txt

          npm run lint:js 2>&1 | tee /tmp/ai-lint-js.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then echo "lint:js failed" >> /tmp/ai-check-results.txt; fi

          npm run lint:css 2>&1 | tee /tmp/ai-lint-css.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then echo "lint:css failed" >> /tmp/ai-check-results.txt; fi

          composer run cs 2>&1 | tee /tmp/ai-phpcs.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then echo "composer cs (PHPCS) failed" >> /tmp/ai-check-results.txt; fi

          composer run test 2>&1 | tee /tmp/ai-phpunit.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then echo "composer test (PHPUnit) failed" >> /tmp/ai-check-results.txt; fi

          if [ -f /tmp/ai-check-results.txt ]; then
            echo "checks_passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "checks_passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch (on failure)
        if: steps.checks.outputs.checks_passed == 'false'
        run: git push origin "${{ steps.branch.outputs.branch }}" || true

      - name: Comment failure on issue
        if: steps.checks.outputs.checks_passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ steps.branch.outputs.issue }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          FAILURES=$(cat /tmp/ai-check-results.txt)

          gh issue comment "$ISSUE" --body "❌ AI agent ran but checks failed. Branch \`${BRANCH}\` has been pushed for manual review.

          **Failed checks:**
          \`\`\`
          ${FAILURES}
          \`\`\`

          Fix the issues on the branch and re-run, or remove the \`ai:claude\` label and re-add it to retry."
          exit 1

      - name: Create PR
        if: steps.checks.outputs.checks_passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ steps.branch.outputs.issue }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          ISSUE_TITLE=$(gh issue view "$ISSUE" --json title -q '.title')
          REVIEWER="${{ vars.REVIEWER_USERNAME }}"

          git push origin "$BRANCH"

          # Build WP Playground URL
          PLAYGROUND_URL=$(python3 -c "
import json, urllib.parse
branch = '${BRANCH}'
blueprint = {
  'steps': [
    {
      'step': 'installPlugin',
      'pluginData': {
        'resource': 'url',
        'url': f'https://github.com/WPRigel/pollify/archive/refs/heads/{branch}.zip'
      },
      'options': {'activate': True}
    }
  ]
}
encoded = urllib.parse.quote(json.dumps(blueprint, separators=(',', ':')))
print(f'https://playground.wordpress.net/#{encoded}')
")

          PR_URL=$(gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "$ISSUE_TITLE" \
            --reviewer "$REVIEWER" \
            --body "<!-- Target branch: develop -->

## Closes
Closes #${ISSUE}

## Summary
<!-- Describe what was changed and why -->

## Test in WP Playground
Open a clean WordPress install with this plugin version pre-installed and activated:

[▶ Test in WP Playground]($PLAYGROUND_URL)

## How to Test Manually
<!-- Steps specific to this change -->

## WordPress Security Checklist
- [ ] Nonces verified (\`wp_verify_nonce\`)
- [ ] Input sanitized (\`sanitize_text_field\`, \`absint\`, etc.)
- [ ] Output escaped (\`esc_html\`, \`esc_attr\`, \`esc_url\`, \`wp_kses_post\`)
- [ ] Capability checks (\`current_user_can\`)
- [ ] DB queries use \`\$wpdb->prepare()\`

## Type of Change
- [ ] Bug fix
- [ ] New feature
- [ ] Refactor / code cleanup

## Risks / Limitations
<!-- Known edge cases or limitations -->

## Checklist
- [ ] All CI checks pass (lint, PHPCS, PHPUnit)
- [ ] Manually tested via WP Playground link above

---
🤖 Implemented by Claude Code (self-hosted runner) · Issue #${ISSUE}")

          gh issue comment "$ISSUE" --body "✅ Implementation complete. PR ready for your review:

${PR_URL}

You have been assigned as reviewer. Click the **WP Playground** link in the PR to test in browser — no local setup needed."

